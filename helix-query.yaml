version: 1

indices:
  site-en: &base-site
    include:
      - '/'
      - '/en'
      - '/en/**'
    exclude:
      - /en/search
      - /en/nav
      - /en/footer
    target: /en/query-index.json
    properties:
      title:
        select: main h1
        value: textContent(el)
      navTitle:
        select: head > meta[property="og:title"]
        value: attribute(el, "content")
      description:
        select: head > meta[name="description"]
        value: attribute(el, "content")
      body:
        select: main
        value: textContent(el)
      image:
        select: head > meta[property="og:image"]
        value: match(attribute(el, "content"), "^(https?:\/\/.*?(aem.live))+(.*)|^(.*)")
      lastModified:
        select: none
        value: parseTimestamp(headers["last-modified"], "ddd, DD MMM YYYY hh:mm:ss GMT")
      navOrder:
        select: head > meta[name="navorder"]
        value: attribute(el, "content")
      hideInNav:
        select: head > meta[name="hideinnav"]
        value: attribute(el, "content")
      listOrder:
        select: head > meta[name="listorder"]
        value: attribute(el, "content")
      category:
        select: head > meta[name="category"]
        value: attribute(el, "content")

  products-en:
    <<: *base-site
    include:
      - '/en/products/**'
    target: /en/products/query-index.json

  news-en:
    <<: *base-site
    include:
      - '/en/news/**'
    target: /en/news/query-index.json

  site-ja:
